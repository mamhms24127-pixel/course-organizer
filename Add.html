<!DOCTYPE html>
<html>
   <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Course Organizer – Add course</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">🎓</div>
        Course<span>organizer</span>
      </a>
      <div class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
     <nav id = "main-nav">
            <a href = "index.html">Home</a>
            <a href = "courses.html">My courses</a>
            <a href = "Add.html" class="nav-cta" >➕Add courses</a>
            <a href = "Contact.html">contact me</a>
        </nav>
    </div>
  </header>
  <main>

    
    <div class="page-hero">
      <div class="badge">➕Add courses</div>
      <h1>Add <em>your new</em> course</h1>
      <p>Enter the course details to save it to your personal list immediately.</p>
    </div>

    <section>
      <div class="form-card">
        <div class="form-card-header">
          <h2>Course data</h2>
        </div>

        <div class="form-body">
          <div class="form-grid">

           
            <div class="form-group full-width">
              <label for="courseName"><span class="required">*</span> Course name </label>
              <input type="text" id="courseName" name="courseName" placeholder="like: python" required />
            </div>

            <div class="form-group">
              <label for="instructor"><span class="required">*</span>Doctor name</label>
              <input type="text" id="instructor" name="instructor" placeholder="like: D.Ahmed Mohamed" required />
            </div>

            <div class="form-group">
              <label for="creditHours"><span class="required">*</span>Credit hours</label>
              <input type="number" id="creditHours" name="creditHours" min="1" max="200" placeholder="like: 3 hours " required />
            </div>

        

           
            <div class="form-group">
              <label for="status">My state </label>
              <select id="status" name="status">
                <option value="active">active</option>
                <option value="done">complete</option>
                <option value="paused">Temporarily suspended</option>
              </select>
            </div>

            
            <div class="form-group full-width">
              <label for="notes">More note</label>
              <textarea id="notes" name="notes" placeholder="You can add information about the course, such as: the platform, the course link, and the difficulty level...."></textarea>
            </div>

          </div>

          
          <div class="success-msg" id="successMsg">
             The course has been successfully added! You can view it on the "Courses" page.".
          </div>
        </div>

        <div class="form-footer">
          <button type="button" class="btn btn-ghost" onclick="resetForm()">Reassignment</button>
          <button type="button" class="btn btn-primary" onclick="submitForm()">Save the course</button>
        </div>
      </div>
    </section>

  </main>
<footer>
  <p>© 2026 Personal Course Organizer</p>
</footer>
  </body>

</html>
